{% extends "base.html" %}

{% block title %}Access Denied (403){% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <h1 class="display-4 mb-4">403 - Access Denied</h1>
            <p class="lead">You don't have permission to access this page.</p>
            <p>Please log in or contact support if you believe this is an error.</p>
            <div class="mt-3">
                <a href="{% url 'quiz:quiz_list' %}" class="btn btn-primary me-2">Return to Home</a>
                <a href="{% url 'login' %}" class="btn btn-outline-primary">Log In</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

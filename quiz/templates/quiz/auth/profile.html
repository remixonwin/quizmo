{% extends 'quiz/base.html' %}

{% block title %}Profile - {{ user.username }}{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h3 class="mb-0">Profile</h3>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-sm-3">
                            <strong>Username:</strong>
                        </div>
                        <div class="col-sm-9">
                            {{ user.username }}
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-sm-3">
                            <strong>Email:</strong>
                        </div>
                        <div class="col-sm-9">
                            {{ user.email }}
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-sm-3">
                            <strong>Joined:</strong>
                        </div>
                        <div class="col-sm-9">
                            {{ user.date_joined|date:"F j, Y" }}
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-sm-3">
                            <strong>Last Login:</strong>
                        </div>
                        <div class="col-sm-9">
                            {{ user.last_login|date:"F j, Y" }}
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <a href="{% url 'quiz:password_reset' %}" class="btn btn-primary">Change Password</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

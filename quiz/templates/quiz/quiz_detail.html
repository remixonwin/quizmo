{% extends 'quiz/base.html' %}

{% block title %}{{ quiz.title }}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h1>{{ quiz.title }}</h1>
    </div>
    <div class="card-body">
        <p class="lead">{{ quiz.description }}</p>
        <a href="{% url 'quiz:take_quiz' quiz.id %}" class="btn btn-primary">Take Quiz</a>
    </div>
</div>
{% endblock %}

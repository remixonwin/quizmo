{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-content">
        <h1>{{ error_code }}</h1>
        <h2>{{ error_message }}</h2>
        <p>Sorry, the page you are looking for could not be found.</p>
        <a href="{% url 'quiz:quiz_list' %}" class="btn btn-primary">Return to Quiz List</a>
    </div>
</div>
{% endblock %}

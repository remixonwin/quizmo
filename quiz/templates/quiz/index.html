<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Server Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h2>Live Server Test</h2>
                    </div>
                    <div class="card-body">
                        <h4>Current Time: <span id="time"></span></h4>
                        <p class="lead">This page will automatically refresh when you make changes.</p>
                        <div class="alert alert-info">
                            Try editing this file to see live updates!
                        </div>
                        <button class="btn btn-primary" onclick="updateTime()">Update Time</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateTime() {
            document.getElementById('time').textContent = new Date().toLocaleString();
        }
        
        // Update time every second
        setInterval(updateTime, 1000);
        
        // Initial update
        updateTime();
    </script>
</body>
</html>

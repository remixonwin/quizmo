name: mn-dmv-quiz
region: nyc
services:
- name: web
  dockerfile_path: Dockerfile
  git:
    branch: main
    repo_clone_url: https://github.com/remixonwin/quizmo.git
  http_port: 8000
  instance_count: 1
  instance_size_slug: basic-xxs
  source_dir: /
domains:
- domain: quizmo.me
  type: PRIMARY
envs:
- key: DJANGO_SETTINGS_MODULE
  scope: RUN_AND_BUILD_TIME
  value: windsurf_app.settings
- key: DEBUG
  scope: RUN_AND_BUILD_TIME
  value: "0"
- key: ALLOWED_HOSTS
  scope: RUN_AND_BUILD_TIME
  value: "quizmo.me,.digitalocean.app"
